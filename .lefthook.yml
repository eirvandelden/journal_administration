remotes:
  - git_url: git@github.com:eirvandelden/dotfiles

pre-commit:
  commands:
    herb-lint:
      glob: "*.erb"
      run: npx herb-lint {staged_files}
      fail_text: "herb-lint found ERB issues. Run: npx herb-lint --fix app/views/"
    i18n-normalized:
      glob: "config/locales/**/*.yml"
      run: bundle exec ruby ./bin/check_i18n_normalized
      fail_text: "Locale files must be normalized. Run: bundle exec i18n-tasks normalize"

pre-push:
  commands:
    herb-lint-full:
      run: npx herb-lint app/views/
      fail_text: "herb-lint failed on full view scan"
      skip: true # TODO: herb-lint npm package not available
    herb-analyze:
      run: bundle exec herb analyze app/views/
      fail_text: "herb analyze failed"
      skip: true # TODO: herb 0.8.10 incompatible with Ruby 4
    i18n-normalized:
      run: bundle exec ruby ./bin/check_i18n_normalized
      fail_text: "Locale files must be normalized. Run: bundle exec i18n-tasks normalize"
