pre-commit:
  commands:
    rubocop:
      tags: rubocop
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion {staged_files}
    herb:
      tags: herb
      glob: "*.erb"
      run: npx @herb-tools/linter {staged_files}

pre-push:
  commands:
    rubocop:
      run: bundle exec rubocop
    herb:
      run: npx @herb-tools/linter app/views/
    brakeman:
      run: bundle exec brakeman --no-pager -q
    bundler_audit:
      run: bundle exec bundler-audit check
    tests:
      run: bundle exec rails test
