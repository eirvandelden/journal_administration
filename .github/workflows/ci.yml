name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    name: Scan Ruby (Brakeman)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true
      - run: bundle exec brakeman --no-pager --ignore-config config/brakeman.ignore

  lint_ruby:
    name: Lint Ruby (RuboCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true
      - run: bundle exec rubocop --parallel --format github
      - run: bundle exec ruby ./bin/check_i18n_normalized

  lint_erb:
    name: Lint ERB (herb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx herb-lint app/views/ --github --fail-level error

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: spinel-coop/setup-rv@main
        with:
          ruby-version: current
          install-gems: true
      - run: bundle exec rails db:setup
        env:
          RAILS_ENV: test
      - run: bundle exec rails test
      - run: bundle exec rails test:system
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: tmp/screenshots
          if-no-files-found: ignore
