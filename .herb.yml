version: 0.8.10

files:
  exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "node_modules/**/*"
    - "public/**/*"

linter:
  enabled: true
  failLevel: error

  rules:
    # Partials use local_assigns.key? pattern, not strict locals yet — warn, not error
    erb-strict-locals-required:
      enabled: true
      severity: warning

    html-img-require-alt:
      enabled: true
      severity: error

    html-tag-name-lowercase:
      enabled: true
      severity: error

    html-require-closing-tags:
      enabled: true
      severity: error

    parser-no-errors:
      enabled: true
      severity: error

formatter:
  enabled: false
